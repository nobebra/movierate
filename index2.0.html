<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieFlow 🎬</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 80px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            color: #fff;
        }

        header h1 span {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-download {
            background: #1a1a2e;
            color: #fff;
            border: 1px solid #2a2a3e;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-download:hover {
            background: #2a2a3e;
        }

        .type-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .type-tab {
            padding: 10px 22px;
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            color: #808080;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
            font-weight: 500;
        }

        .type-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border-color: transparent;
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            border-bottom: 2px solid #1a1a2e;
        }

        .tab {
            padding: 15px 30px;
            background: none;
            border: none;
            color: #808080;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .tab.active {
            color: #fff;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .form-section {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #b0b0b0;
            font-size: 0.95em;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0f0f1a;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            color: #fff;
            font-size: 1em;
        }

        .form-group input:focus {
            outline: none;
            border-color: #c084fc;
        }

        .form-bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .rating-section {
            flex: 1;
        }

        .rating-section > label {
            display: block;
            margin-bottom: 10px;
            color: #b0b0b0;
            font-size: 1em;
        }

        .rating-input-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .rating-number {
            font-size: 2.2em;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
            color: #ffd700;
        }

        .stars {
            display: flex;
            gap: 6px;
            font-size: 1.7em;
        }

        .star {
            cursor: pointer;
            color: #3a3a4e;
            transition: all 0.2s;
            user-select: none;
        }

        .star:hover,
        .star.active {
            color: #ffd700;
            transform: scale(1.1);
        }

        .btn-add {
            background: #e50914;
            color: white;
            border: none;
            padding: 16px 36px;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-add:hover {
            background: #ff1a25;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(229, 9, 20, 0.4);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .stats {
            display: flex;
            gap: 25px;
            font-size: 1.1em;
        }

        .stats span {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
            font-size: 1.3em;
        }

        .filters {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 10px 16px 10px 40px;
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            color: #fff;
            font-size: 1em;
            width: 250px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #c084fc;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #808080;
        }

        .filters select {
            padding: 10px 16px;
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            color: #fff;
            font-size: 1em;
            cursor: pointer;
        }

        .filters select:focus {
            outline: none;
            border-color: #c084fc;
        }

        .btn-reset {
            background: #1a1a2e;
            color: #fff;
            border: 1px solid #2a2a3e;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-reset:hover {
            background: #2a2a3e;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        .movie-card {
            background: #1a1a2e;
            border-radius: 12px;
            overflow: visible;
            transition: all 0.3s;
            border: 1px solid #2a2a3e;
            display: flex;
            flex-direction: column;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-color: #667eea;
        }

        .movie-poster {
            width: 100%;
            height: 360px;
            object-fit: cover;
            background: #0f0f1a;
            border-radius: 12px 12px 0 0;
        }

        .movie-info {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .movie-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
        }

        .movie-genres-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            gap: 10px;
        }

        .movie-genres-container {
            position: relative;
            flex: 1;
        }

        .movie-genre-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(192, 132, 252, 0.2);
            color: #c084fc;
            font-size: 0.8em;
            cursor: help;
        }

        .genres-tooltip {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #0f0f1a;
            border: 1px solid #c084fc;
            border-radius: 8px;
            padding: 10px 14px;
            margin-top: 6px;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
        }

        .genres-tooltip.show {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-width: 350px;
            white-space: normal;
        }

        .genres-tooltip .genre-item {
            padding: 4px 10px;
            background: rgba(192, 132, 252, 0.2);
            border-radius: 10px;
            font-size: 0.85em;
            color: #c084fc;
            white-space: nowrap;
        }

        .card-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            align-items: center;
        }

        .btn-edit-icon,
        .btn-delete-icon {
            background: none;
            border: none;
            font-size: 1.3em;
            cursor: pointer;
            opacity: 0.5;
            transition: all 0.2s;
            padding: 2px;
        }

        .btn-edit-icon:hover,
        .btn-delete-icon:hover {
            opacity: 1;
            transform: scale(1.2);
        }

        .rating-section-card {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 10px;
        }

        .rating-value {
            font-size: 1.3em;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .rating-value .star-icon {
            font-size: 0.9em;
        }

        .rating-red { 
            color: #ff4757;
            text-shadow: 0 0 12px rgba(255, 71, 87, 0.7), 0 0 20px rgba(255, 71, 87, 0.4);
        }
        .rating-yellow { 
            color: #ffa502;
            text-shadow: 0 0 12px rgba(255, 165, 2, 0.7), 0 0 20px rgba(255, 165, 2, 0.4);
        }
        .rating-green { 
            color: #2ed573;
            text-shadow: 0 0 12px rgba(46, 213, 115, 0.7), 0 0 20px rgba(46, 213, 115, 0.4);
        }
        .rating-diamond {
            background: linear-gradient(135deg, #00d4ff 0%, #7b2ff7 50%, #ff00e5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 10px rgba(123, 47, 247, 0.9)) drop-shadow(0 0 20px rgba(255, 0, 229, 0.6));
        }

        .editable-stars {
            display: flex;
            gap: 3px;
        }

        .editable-stars .star {
            font-size: 1.15em;
        }

        .watchlist-badge {
            display: inline-block;
            padding: 5px 12px;
            background: rgba(192, 132, 252, 0.2);
            color: #c084fc;
            border-radius: 12px;
            font-size: 0.85em;
            margin-bottom: 10px;
            align-self: flex-start;
        }

        .watchlist-rating {
            display: flex;
            gap: 3px;
            margin-top: auto;
        }

        .watchlist-rating .star {
            font-size: 1.1em;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
            color: #808080;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            border: 1px solid #2a2a3e;
        }

        .modal h2 {
            margin-bottom: 20px;
            color: #fff;
            font-size: 1.5em;
        }

        .modal .form-group {
            margin-bottom: 15px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-cancel {
            background: #2a2a3e;
            color: #fff;
            border: 1px solid #3a3a4e;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            background: #3a3a4e;
        }

        @media (max-width: 768px) {
            body {
                padding: 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-bottom-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .controls {
                flex-direction: column;
                align-items: flex-start;
            }

            .filters {
                width: 100%;
            }

            .search-box input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Movie<span>Flow</span></h1>
            <button class="btn-download" onclick="exportJSON()">💾 Скачать JSON</button>
        </header>

        <div class="type-tabs">
            <button class="type-tab active" onclick="switchType('movies')">🎬 Фильмы</button>
            <button class="type-tab" onclick="switchType('books')">📚 Книги</button>
        </div>

        <div class="tabs">
            <button class="tab active" id="tabCollection" onclick="switchTab('collection')">🎬 Моя коллекция</button>
            <button class="tab" id="tabWatchlist" onclick="switchTab('watchlist')">📋 Буду смотреть</button>
        </div>

        <section class="form-section">
            <form id="itemForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label id="titleLabel">Название фильма *</label>
                        <input type="text" id="title" required placeholder="Например: Начало">
                    </div>
                    <div class="form-group">
                        <label id="genreLabel">Жанры (через запятую)</label>
                        <input type="text" id="genres" placeholder="Фантастика, Триллер">
                    </div>
                    <div class="form-group">
                        <label id="posterLabel">Постер (URL)</label>
                        <input type="url" id="poster" placeholder="https://...">
                    </div>
                </div>
                <div class="form-bottom-row">
                    <div class="rating-section">
                        <label>⭐ Твоя оценка <span style="color: #808080; font-size: 0.85em;">(оставь пустым, чтобы добавить в лист ожидания)</span></label>
                        <div class="rating-input-row">
                            <div class="rating-number" id="ratingNumber">0</div>
                            <div class="stars" id="starRating">
                                <span class="star" data-value="1">★</span>
                                <span class="star" data-value="2">★</span>
                                <span class="star" data-value="3">★</span>
                                <span class="star" data-value="4">★</span>
                                <span class="star" data-value="5">★</span>
                                <span class="star" data-value="6">★</span>
                                <span class="star" data-value="7">★</span>
                                <span class="star" data-value="8">★</span>
                                <span class="star" data-value="9">★</span>
                                <span class="star" data-value="10">★</span>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn-add">Добавить</button>
                </div>
            </form>
        </section>

        <div class="controls">
            <div class="stats">
                <div id="statCountLabel">🎞️ Фильмов:</div>
                <span id="statCount">0</span>
                <div id="statAvgLabel">⭐ Средняя оценка:</div>
                <span id="statAvg">0</span>
            </div>
            <div class="filters">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="Поиск по названию..." oninput="renderItems()">
                </div>
                <select id="sortSelect" onchange="renderItems()">
                    <option value="date_desc">🕐 По дате (новые)</option>
                    <option value="date_asc">🕑 По дате (старые)</option>
                    <option value="rating_desc">⭐ Рейтинг (высокий)</option>
                    <option value="rating_asc">⭐ Рейтинг (низкий)</option>
                    <option value="title_asc"> Название (А-Я)</option>
                    <option value="title_desc">📝 Название (Я-А)</option>
                </select>
                <select id="genreFilter" onchange="renderItems()">
                    <option value="all">Все жанры</option>
                </select>
                <button class="btn-reset" onclick="resetFilters()">🔄 Сбросить</button>
            </div>
        </div>

        <div class="movies-grid" id="itemsGrid"></div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h2>️ Редактировать</h2>
            <div class="form-group">
                <label id="editTitleLabel">Название</label>
                <input type="text" id="editTitle">
            </div>
            <div class="form-group">
                <label id="editGenreLabel">Жанры (через запятую)</label>
                <input type="text" id="editGenres">
            </div>
            <div class="modal-actions">
                <button class="btn-save" onclick="saveEdit()">💾 Сохранить</button>
                <button class="btn-cancel" onclick="closeEditModal()">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        let movies = JSON.parse(localStorage.getItem('movieflow_movies')) || [];
        let books = JSON.parse(localStorage.getItem('movieflow_books')) || [];
        let currentType = 'movies';
        let currentTab = 'collection';
        let currentRating = 0;
        let editingId = null;

        document.addEventListener('DOMContentLoaded', () => {
            setupStarRating();
            document.getElementById('itemForm').addEventListener('submit', addItem);
            renderAll();
        });

        function setupStarRating() {
            const stars = document.querySelectorAll('#starRating .star');
            const numberEl = document.getElementById('ratingNumber');
            
            stars.forEach(star => {
                star.addEventListener('click', () => {
                    const val = parseInt(star.dataset.value);
                    if (currentRating === val) {
                        currentRating = 0;
                    } else {
                        currentRating = val;
                    }
                    updateFormStars();
                });
                star.addEventListener('mouseover', () => {
                    const val = parseInt(star.dataset.value);
                    stars.forEach(s => s.classList.toggle('active', parseInt(s.dataset.value) <= val));
                    numberEl.textContent = val;
                });
            });
            document.getElementById('starRating').addEventListener('mouseleave', () => {
                updateFormStars();
                numberEl.textContent = currentRating;
            });
        }

        function updateFormStars() {
            const stars = document.querySelectorAll('#starRating .star');
            stars.forEach(s => s.classList.toggle('active', parseInt(s.dataset.value) <= currentRating));
            document.getElementById('ratingNumber').textContent = currentRating;
        }

        function switchType(type) {
            currentType = type;
            document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (type === 'books') {
                document.getElementById('titleLabel').textContent = 'Название книги *';
                document.getElementById('genreLabel').textContent = 'Жанры (через запятую)';
                document.getElementById('posterLabel').textContent = 'Обложка (URL)';
                document.getElementById('statCountLabel').textContent = '📚 Книг:';
                document.getElementById('tabCollection').innerHTML = '📚 Моя коллекция';
                document.getElementById('tabWatchlist').innerHTML = '📖 Буду читать';
            } else {
                document.getElementById('titleLabel').textContent = 'Название фильма *';
                document.getElementById('genreLabel').textContent = 'Жанры (через запятую)';
                document.getElementById('posterLabel').textContent = 'Постер (URL)';
                document.getElementById('statCountLabel').textContent = '️ Фильмов:';
                document.getElementById('tabCollection').innerHTML = '🎬 Моя коллекция';
                document.getElementById('tabWatchlist').innerHTML = '📋 Буду смотреть';
            }
            
            renderAll();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderAll();
        }

        function addItem(e) {
            e.preventDefault();
            const title = document.getElementById('title').value.trim();
            const genres = document.getElementById('genres').value.trim();
            const poster = document.getElementById('poster').value.trim();
            
            const isWatchlist = currentRating === 0;
            const collection = currentType === 'movies' ? movies : books;

            const newItem = {
                id: Date.now().toString(),
                title,
                genres,
                poster: poster || (currentType === 'movies' ? 'https://via.placeholder.com/240x360/1a1a2e/667eea?text=No+Poster' : 'https://via.placeholder.com/240x360/1a1a2e/667eea?text=No+Cover'),
                rating: currentRating,
                dateAdded: Date.now(),
                isWatchlist
            };

            collection.unshift(newItem);
            saveData();
            
            e.target.reset();
            currentRating = 0;
            updateFormStars();
            
            switchTab(isWatchlist ? 'watchlist' : 'collection');
        }

        function openEditModal(id) {
            const collection = currentType === 'movies' ? movies : books;
            const item = collection.find(m => m.id === id);
            if (item) {
                editingId = id;
                document.getElementById('editTitle').value = item.title;
                document.getElementById('editGenres').value = item.genres || '';
                document.getElementById('editTitleLabel').textContent = currentType === 'movies' ? 'Название фильма' : 'Название книги';
                document.getElementById('editModal').classList.add('active');
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingId = null;
        }

        function saveEdit() {
            if (!editingId) return;
            
            const collection = currentType === 'movies' ? movies : books;
            const item = collection.find(m => m.id === editingId);
            if (item) {
                item.title = document.getElementById('editTitle').value.trim();
                item.genres = document.getElementById('editGenres').value.trim();
                saveData();
                closeEditModal();
            }
        }

        function rateItem(id, rating) {
            const collection = currentType === 'movies' ? movies : books;
            const item = collection.find(m => m.id === id);
            if (item) {
                item.rating = rating;
                item.isWatchlist = false;
                saveData();
                switchTab('collection');
            }
        }

        function updateItemRating(id, newRating) {
            const collection = currentType === 'movies' ? movies : books;
            const item = collection.find(m => m.id === id);
            if (item) {
                item.rating = newRating;
                if (newRating === 0) {
                    item.isWatchlist = true;
                } else {
                    item.isWatchlist = false;
                }
                saveData();
            }
        }

        function deleteItem(id) {
            if(confirm('Удалить?')) {
                if (currentType === 'movies') {
                    movies = movies.filter(m => m.id !== id);
                } else {
                    books = books.filter(m => m.id !== id);
                }
                saveData();
                renderAll();
            }
        }

        function renderAll() {
            updateGenreFilter();
            renderStats();
            renderItems();
        }

        function updateGenreFilter() {
            const collection = currentType === 'movies' ? movies : books;
            const select = document.getElementById('genreFilter');
            const currentVal = select.value;
            const allGenres = new Set();
            
            collection.forEach(m => {
                if(m.genres) {
                    m.genres.split(',').forEach(g => allGenres.add(g.trim()));
                }
            });

            select.innerHTML = '<option value="all">Все жанры</option>';
            Array.from(allGenres).sort().forEach(g => {
                if(g) select.innerHTML += `<option value="${g}">${g}</option>`;
            });
            select.value = currentVal;
        }

        function renderStats() {
            const collection = currentType === 'movies' ? movies : books;
            const filtered = collection.filter(m => !m.isWatchlist);
            document.getElementById('statCount').textContent = filtered.length;
            
            if (filtered.length > 0) {
                const avg = filtered.reduce((sum, m) => sum + m.rating, 0) / filtered.length;
                document.getElementById('statAvg').textContent = avg.toFixed(1);
            } else {
                document.getElementById('statAvg').textContent = '0';
            }
        }

        function getRatingColorClass(rating) {
            if (rating >= 10) return 'rating-diamond';
            if (rating >= 7) return 'rating-green';
            if (rating >= 5) return 'rating-yellow';
            return 'rating-red';
        }

        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            const collection = currentType === 'movies' ? movies : books;
            const sortVal = document.getElementById('sortSelect').value;
            const genreVal = document.getElementById('genreFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();

            let filtered = collection.filter(m => {
                if (currentTab === 'watchlist') return m.isWatchlist;
                return !m.isWatchlist;
            });

            if (searchTerm) {
                filtered = filtered.filter(m => m.title.toLowerCase().includes(searchTerm));
            }

            if (genreVal !== 'all') {
                filtered = filtered.filter(m => m.genres && m.genres.includes(genreVal));
            }

            filtered.sort((a, b) => {
                switch(sortVal) {
                    case 'date_desc': return b.dateAdded - a.dateAdded;
                    case 'date_asc': return a.dateAdded - b.dateAdded;
                    case 'rating_desc': return b.rating - a.rating;
                    case 'rating_asc': return a.rating - b.rating;
                    case 'title_asc': return a.title.localeCompare(b.title, 'ru');
                    case 'title_desc': return b.title.localeCompare(a.title, 'ru');
                    default: return 0;
                }
            });

            if (filtered.length === 0) {
                const typeText = currentType === 'movies' ? 'фильмов' : 'книг';
                const searchMsg = searchTerm ? `Ничего не найдено по запросу "${searchTerm}"` : '';
                const msg = currentTab === 'watchlist' 
                    ? `Твой лист ожидания пуст.\nДобавь ${typeText} без оценки!` 
                    : `В коллекции пока нет ${typeText}.\nДобавь свой первый ${currentType === 'movies' ? 'фильм' : 'книгу'} выше! ✨`;
                grid.innerHTML = `<div class="empty-state"><h3>🍿 Пусто</h3><p style="white-space: pre-line;">${searchMsg || msg}</p></div>`;
                return;
            }

            grid.innerHTML = filtered.map(m => {
                const ratingColorClass = getRatingColorClass(m.rating);
                const genres = m.genres ? m.genres.split(',').map(g => g.trim()).filter(g => g) : [];
                const firstGenre = genres[0] || 'Жанр не указан';

                if (m.isWatchlist) {
                    const ratingStars = Array.from({length: 10}, (_, i) => {
                        const rating = i + 1;
                        return `<span class="star" onclick="rateItem('${m.id}', ${rating})" title="Оценить на ${rating}">★</span>`;
                    }).join('');

                    const genresHtml = genres.length > 0 ? `
                        <div class="movie-genres-container" onmouseenter="showGenresTooltip('${m.id}')" onmouseleave="hideGenresTooltip('${m.id}')">
                            <span class="movie-genre-tag">${firstGenre}${genres.length > 1 ? ' +' + (genres.length - 1) : ''}</span>
                            <div class="genres-tooltip" id="tooltip-${m.id}">
                                ${genres.map(g => `<span class="genre-item">${g}</span>`).join('')}
                            </div>
                        </div>
                    ` : '<span class="movie-genre-tag">Жанр не указан</span>';

                    return `
                        <div class="movie-card">
                            <img src="${m.poster}" alt="${m.title}" class="movie-poster" onerror="this.src='${currentType === 'movies' ? 'https://via.placeholder.com/240x360/1a1a2e/667eea?text=No+Poster' : 'https://via.placeholder.com/240x360/1a1a2e/667eea?text=No+Cover'}'">
                            <div class="movie-info">
                                <div class="movie-title">${m.title}</div>
                                <div class="movie-genres-row">
                                    ${genresHtml}
                                    <div class="card-actions">
                                        <button class="btn-edit-icon" onclick="openEditModal('${m.id}')" title="Редактировать">✏️</button>
                                        <button class="btn-delete-icon" onclick="deleteItem('${m.id}')" title="Удалить">🗑️</button>
                                    </div>
                                </div>
                                <div class="watchlist-rating">${ratingStars}</div>
                            </div>
                        </div>
                    `;
                }

                const editableStars = Array.from({length: 10}, (_, i) => {
                    const rating = i + 1;
                    const filled = i < m.rating;
                    return `<span class="star ${filled ? 'active' : ''}" onclick="updateItemRating('${m.id}', ${rating})" title="Изменить оценку на ${rating}">★</span>`;
                }).join('');

                const genresHtml = genres.length > 0 ? `
                    <div class="movie-genres-container" onmouseenter="showGenresTooltip('${m.id}')" onmouseleave="hideGenresTooltip('${m.id}')">
                        <span class="movie-genre-tag">${firstGenre}${genres.length > 1 ? ' +' + (genres.length - 1) : ''}</span>
                        <div class="genres-tooltip" id="tooltip-${m.id}">
                            ${genres.map(g => `<span class="genre-item">${g}</span>`).join('')}
                        </div>
                    </div>
                ` : '<span class="movie-genre-tag">Жанр не указан</span>';

                return `
                    <div class="movie-card">
                        <img src="${m.poster}" alt="${m.title}" class="movie-poster" onerror="this.src='${currentType === 'movies' ? 'https://via.placeholder.com/240x360/1a1a2e/667eea?text=No+Poster' : 'https://via.placeholder.com/240x360/1a1a2e/667eea?text=No+Cover'}'">
                        <div class="movie-info">
                            <div class="movie-title">${m.title}</div>
                            <div class="movie-genres-row">
                                ${genresHtml}
                                <div class="card-actions">
                                    <button class="btn-edit-icon" onclick="openEditModal('${m.id}')" title="Редактировать">✏️</button>
                                    <button class="btn-delete-icon" onclick="deleteItem('${m.id}')" title="Удалить">🗑️</button>
                                </div>
                            </div>
                            <div class="rating-section-card">
                                <span class="rating-value ${ratingColorClass}">
                                    <span class="star-icon">★</span> ${m.rating}/10
                                </span>
                                <div class="editable-stars">${editableStars}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showGenresTooltip(id) {
            const tooltip = document.getElementById(`tooltip-${id}`);
            if (tooltip) tooltip.classList.add('show');
        }

        function hideGenresTooltip(id) {
            const tooltip = document.getElementById(`tooltip-${id}`);
            if (tooltip) tooltip.classList.remove('show');
        }

        function resetFilters() {
            document.getElementById('sortSelect').value = 'date_desc';
            document.getElementById('genreFilter').value = 'all';
            document.getElementById('searchInput').value = '';
            renderItems();
        }

        function exportJSON() {
            const data = {
                movies: movies,
                books: books,
                exportDate: new Date().toISOString()
            };
            const dataStr = JSON.stringify(data, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            const dateStr = new Date().toISOString().slice(0, 10);
            a.download = `movieflow_backup_${dateStr}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function saveData() {
            localStorage.setItem('movieflow_movies', JSON.stringify(movies));
            localStorage.setItem('movieflow_books', JSON.stringify(books));
            renderAll();
        }

        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                closeEditModal();
            }
        });
    </script>
</body>
</html>
