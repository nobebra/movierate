<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieFlow 🎬</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff, transparent),
                radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent),
                radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 160px 30px, #fff, transparent),
                radial-gradient(1px 1px at 200px 120px, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 250px 60px, #fff, transparent),
                radial-gradient(1px 1px at 300px 90px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 350px 40px, #fff, transparent),
                radial-gradient(1px 1px at 400px 100px, rgba(255,255,255,0.8), transparent);
            background-size: 400px 150px;
            background-repeat: repeat;
            min-height: 100vh;
            padding: 20px;
            color: #e2e8f0;
        }

        .container { 
            max-width: 1100px; 
            margin: 0 auto;
        }

        header { 
            text-align: center; 
            margin-bottom: 30px;
        }

        h1 { 
            font-size: 2.2em; 
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a0aec0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 0.95em;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
        }

        .add-form {
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .form-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            color: #e2e8f0;
        }

        .form-group { 
            margin-bottom: 12px; 
        }

        .form-group label { 
            display: block; 
            margin-bottom: 5px; 
            color: #a0aec0;
            font-weight: 500;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .form-row { 
            display: flex; 
            gap: 12px; 
            flex-wrap: wrap; 
        }

        .form-row .form-group { 
            flex: 1; 
            min-width: 180px; 
        }

        .rating-section {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .rating-label { 
            font-weight: 600; 
            color: #e2e8f0;
            margin-bottom: 10px;
            display: block;
            font-size: 0.9em;
        }

        .rating-input-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        #ratingInput {
            width: 60px;
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
        }

        .stars { 
            display: flex; 
            gap: 4px; 
        }

        .star { 
            font-size: 20px; 
            cursor: pointer; 
            color: #4a5568;
            transition: all 0.2s ease;
        }

        .star.active { 
            color: #fbbf24;
            transform: scale(1.1);
        }

        .star:hover { 
            transform: scale(1.15);
        }

        .hint {
            font-size: 12px;
            color: #718096;
            margin-top: 5px;
        }

        .hint a { 
            color: #667eea; 
            text-decoration: none;
        }

        .add-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        /* Filters Section */
        .filters-section {
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .filters-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 12px;
            color: #e2e8f0;
        }

        .filters-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .filter-group {
            flex: 1;
            min-width: 180px;
        }

        .filter-label {
            display: block;
            margin-bottom: 5px;
            color: #a0aec0;
            font-weight: 500;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-select {
            width: 100%;
            padding: 9px 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }

        .filter-select:focus {
            outline: none;
            border-color: #667eea;
        }

        .filter-select option {
            background: #1a202c;
            color: #fff;
        }

        .genres-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .genre-filter-tag {
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            font-size: 0.8em;
            font-weight: 500;
            color: #a0aec0;
            transition: all 0.3s ease;
            user-select: none;
        }

        .genre-filter-tag:hover {
            border-color: #667eea;
            color: #fff;
        }

        .genre-filter-tag.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .clear-filters {
            padding: 8px 16px;
            border: 1px solid #fc8181;
            border-radius: 8px;
            background: transparent;
            color: #fc8181;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .clear-filters:hover {
            background: #fc8181;
            color: white;
        }

        .stats {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            min-width: 130px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            color: #fff;
        }

        .stat-label {
            color: #a0aec0;
            margin-top: 3px;
            font-size: 0.85em;
        }

        .movies-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 20px;
        }

        .movie-card {
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
        }

        .movie-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .movie-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        .movie-card:hover::before {
            opacity: 1;
        }

        .movie-poster { 
            width: 100%; 
            height: 320px; 
            object-fit: cover;
        }

        .no-poster {
            width: 100%;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
            font-size: 4em;
            opacity: 0.5;
        }

        .movie-info { 
            padding: 15px; 
        }

        .movie-title { 
            font-size: 1.1em; 
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .genres-container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 12px;
        }

        .genre-tag {
            background: rgba(102, 126, 234, 0.2);
            color: #a0aec0;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7em;
            font-weight: 500;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .movie-rating {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .rating-value { 
            font-size: 1.8em; 
            font-weight: 700;
        }

        .rating-value.low {
            color: #fc8181;
            text-shadow: 0 0 10px rgba(252, 129, 129, 0.5);
        }

        .rating-value.medium {
            color: #fbbf24;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }

        .rating-value.high {
            color: #48bb78;
            text-shadow: 0 0 10px rgba(72, 187, 120, 0.5);
        }

        .rating-value.diamond {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            animation: diamondShine 2s ease infinite;
        }

        @keyframes diamondShine {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.4); }
        }

        .rating-stars {
            color: #fbbf24;
            font-size: 1.1em;
            letter-spacing: 1px;
        }

        .delete-btn {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            border: 1px solid rgba(252, 129, 129, 0.3);
            border-radius: 8px;
            background: transparent;
            color: #fc8181;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #fc8181;
            color: white;
            border-color: transparent;
        }

        .message {
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: 500;
            font-size: 14px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.error {
            background: rgba(252, 129, 129, 0.2);
            color: #fc8181;
            border: 1px solid rgba(252, 129, 129, 0.3);
        }

        .message.success {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
            border: 1px solid rgba(72, 187, 120, 0.3);
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.1em;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .active-filter-info {
            background: rgba(102, 126, 234, 0.15);
            padding: 8px 14px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.85em;
            color: #a0aec0;
            display: none;
        }

        .active-filter-info.show {
            display: block;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .add-form { padding: 18px; }
            .filters-section { padding: 15px; }
            .movies-grid { grid-template-columns: 1fr; }
            .stats { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 MovieFlow</h1>
            <p class="subtitle">Твой личный кинодневник</p>
        </header>

        <div class="add-form">
            <h2 class="form-title">✨ Добавить фильм</h2>
            
            <div class="form-group">
                <label>Название фильма *</label>
                <input type="text" id="movieTitle" placeholder="Например: Криминальное чтиво">
            </div>

            <div class="form-group">
                <label>Жанры (через запятую)</label>
                <input type="text" id="movieGenres" placeholder="Криминал, Драма, Триллер">
            </div>

            <div class="form-group">
                <label>Постер (URL)</label>
                <input type="text" id="moviePoster" placeholder="https://...">
                <div class="hint">💡 Найди на <a href="https://www.kinopoisk.ru" target="_blank">Кинопоиске</a> → ПКМ по постеру → Копировать URL</div>
            </div>

            <div class="rating-section">
                <span class="rating-label">⭐ Твоя оценка</span>
                <div class="rating-input-wrapper">
                    <input type="number" id="ratingInput" min="1" max="10" value="7">
                    <div class="stars" id="starContainer">
                        <span class="star" data-rating="1">★</span>
                        <span class="star" data-rating="2">★</span>
                        <span class="star" data-rating="3">★</span>
                        <span class="star" data-rating="4">★</span>
                        <span class="star" data-rating="5">★</span>
                        <span class="star" data-rating="6">★</span>
                        <span class="star" data-rating="7">★</span>
                        <span class="star" data-rating="8">★</span>
                        <span class="star" data-rating="9">★</span>
                        <span class="star" data-rating="10">★</span>
                    </div>
                </div>
            </div>

            <button onclick="addMovie()" class="add-btn">Добавить в коллекцию</button>
        </div>

        <div id="messageContainer"></div>

        <div class="filters-section">
            <div class="filters-title">🔍 Фильтры и сортировка</div>
            
            <div class="filters-row">
                <div class="filter-group">
                    <label class="filter-label">Сортировка</label>
                    <select class="filter-select" id="sortBy" onchange="applyFilters()">
                        <option value="newest">🕐 По дате (новые)</option>
                        <option value="oldest">🕑 По дате (старые)</option>
                        <option value="rating-high">⭐ Рейтинг (высокий)</option>
                        <option value="rating-low">⭐ Рейтинг (низкий)</option>
                        <option value="title-asc"> Название (А-Я)</option>
                        <option value="title-desc">📝 Название (Я-А)</option>
                    </select>
                </div>
            </div>

            <div class="filter-label">Фильтр по жанрам</div>
            <div class="genres-filter" id="genresFilter">
                <div class="genre-filter-tag active" data-genre="all">Все фильмы</div>
            </div>

            <div class="active-filter-info" id="activeFilterInfo"></div>
            
            <button class="clear-filters" style="display: none;" id="clearFiltersBtn" onclick="clearFilters()">
                🔄 Сбросить фильтры
            </button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="movieCount">0</div>
                <div class="stat-label">Фильмов</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgRating">0</div>
                <div class="stat-label">Средняя оценка</div>
            </div>
        </div>

        <div class="movies-grid" id="moviesGrid"></div>
    </div>

    <script>
        let movies = JSON.parse(localStorage.getItem('myMovies')) || [];
        let currentFilter = {
            genre: 'all',
            sortBy: 'newest'
        };

        const stars = document.querySelectorAll('.star');
        const ratingInput = document.getElementById('ratingInput');

        stars.forEach(star => {
            star.addEventListener('click', function() {
                const rating = parseInt(this.getAttribute('data-rating'));
                ratingInput.value = rating;
                updateStars(rating);
            });
        });

        ratingInput.addEventListener('input', function() {
            let value = parseInt(this.value);
            if (value < 1) value = 1;
            if (value > 10) value = 10;
            updateStars(value);
        });

        function updateStars(rating) {
            stars.forEach((star, index) => {
                star.classList.toggle('active', index < rating);
            });
        }

        document.getElementById('movieTitle').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addMovie();
        });

        function addMovie() {
            const title = document.getElementById('movieTitle').value.trim();
            const genresInput = document.getElementById('movieGenres').value.trim();
            const poster = document.getElementById('moviePoster').value.trim();
            const rating = parseInt(document.getElementById('ratingInput').value);

            if (!title) {
                showMessage('Введите название фильма', 'error');
                return;
            }

            if (rating < 1 || rating > 10) {
                showMessage('Оценка должна быть от 1 до 10', 'error');
                return;
            }

            const genres = genresInput 
                ? genresInput.split(',').map(g => g.trim()).filter(g => g)
                : [];

            const movie = {
                id: Date.now(),
                title: title,
                genres: genres,
                poster: poster || null,
                rating: rating,
                added: new Date().toISOString()
            };

            movies.push(movie);
            saveMovies();
            renderMovies();
            updateGenresFilter();
            
            document.getElementById('movieTitle').value = '';
            document.getElementById('movieGenres').value = '';
            document.getElementById('moviePoster').value = '';
            ratingInput.value = 7;
            updateStars(7);
            
            showMessage(`✅ "${title}" добавлен!`, 'success');
        }

        function deleteMovie(id) {
            if (confirm('Удалить этот фильм?')) {
                movies = movies.filter(m => m.id !== id);
                saveMovies();
                renderMovies();
                updateGenresFilter();
                showMessage('Фильм удален', 'success');
            }
        }

        function saveMovies() {
            localStorage.setItem('myMovies', JSON.stringify(movies));
        }

        function updateGenresFilter() {
            const genresFilterContainer = document.getElementById('genresFilter');
            const allGenres = new Set();
            
            movies.forEach(movie => {
                if (movie.genres) {
                    movie.genres.forEach(genre => allGenres.add(genre));
                }
            });

            const sortedGenres = Array.from(allGenres).sort();
            
            let html = `<div class="genre-filter-tag ${currentFilter.genre === 'all' ? 'active' : ''}" onclick="filterByGenre('all')">Все фильмы</div>`;
            
            sortedGenres.forEach(genre => {
                const count = movies.filter(m => m.genres && m.genres.includes(genre)).length;
                const isActive = currentFilter.genre === genre;
                html += `<div class="genre-filter-tag ${isActive ? 'active' : ''}" onclick="filterByGenre('${genre.replace(/'/g, "\\'")}')">${genre} (${count})</div>`;
            });
            
            genresFilterContainer.innerHTML = html;
        }

        function filterByGenre(genre) {
            currentFilter.genre = genre;
            renderMovies();
            updateGenresFilter();
            
            const infoDiv = document.getElementById('activeFilterInfo');
            const clearBtn = document.getElementById('clearFiltersBtn');
            
            if (genre !== 'all') {
                infoDiv.textContent = `🎬 Показаны фильмы жанра: ${genre}`;
                infoDiv.classList.add('show');
                clearBtn.style.display = 'inline-block';
            } else {
                infoDiv.classList.remove('show');
                clearBtn.style.display = 'none';
            }
        }

        function applyFilters() {
            currentFilter.sortBy = document.getElementById('sortBy').value;
            renderMovies();
        }

        function clearFilters() {
            currentFilter.genre = 'all';
            currentFilter.sortBy = 'newest';
            document.getElementById('sortBy').value = 'newest';
            renderMovies();
            updateGenresFilter();
            document.getElementById('activeFilterInfo').classList.remove('show');
            document.getElementById('clearFiltersBtn').style.display = 'none';
        }

        function getFilteredAndSortedMovies() {
            let filtered = [...movies];
            
            if (currentFilter.genre !== 'all') {
                filtered = filtered.filter(m => m.genres && m.genres.includes(currentFilter.genre));
            }
            
            switch(currentFilter.sortBy) {
                case 'newest':
                    filtered.sort((a, b) => new Date(b.added) - new Date(a.added));
                    break;
                case 'oldest':
                    filtered.sort((a, b) => new Date(a.added) - new Date(b.added));
                    break;
                case 'rating-high':
                    filtered.sort((a, b) => b.rating - a.rating);
                    break;
                case 'rating-low':
                    filtered.sort((a, b) => a.rating - b.rating);
                    break;
                case 'title-asc':
                    filtered.sort((a, b) => a.title.localeCompare(b.title));
                    break;
                case 'title-desc':
                    filtered.sort((a, b) => b.title.localeCompare(a.title));
                    break;
            }
            
            return filtered;
        }

        function renderMovies() {
            const grid = document.getElementById('moviesGrid');
            const countSpan = document.getElementById('movieCount');
            const avgSpan = document.getElementById('avgRating');

            grid.innerHTML = '';
            
            const displayMovies = getFilteredAndSortedMovies();
            
            if (displayMovies.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon"></div>
                        <div>${movies.length === 0 ? 'Пока нет фильмов. Добавь первый!' : 'По выбранному фильтру ничего не найдено'}</div>
                    </div>
                `;
                countSpan.textContent = '0';
                avgSpan.textContent = '0';
                return;
            }

            displayMovies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                
                let ratingClass = '';
                if (movie.rating <= 4) ratingClass = 'low';
                else if (movie.rating <= 6) ratingClass = 'medium';
                else if (movie.rating <= 9) ratingClass = 'high';
                else ratingClass = 'diamond';
                
                const starsDisplay = '★'.repeat(movie.rating) + '☆'.repeat(10 - movie.rating);
                
                const genresHtml = movie.genres && movie.genres.length > 0
                    ? `<div class="genres-container">${movie.genres.map(g => `<span class="genre-tag">${g}</span>`).join('')}</div>`
                    : '';
                
                card.innerHTML = `
                    ${movie.poster 
                        ? `<img src="${movie.poster}" alt="${movie.title}" class="movie-poster" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">`
                        : ''
                    }
                    <div class="no-poster" style="display: ${movie.poster ? 'none' : 'flex'}">🎬</div>
                    <div class="movie-info">
                        <h3 class="movie-title">${movie.title}</h3>
                        ${genresHtml}
                        <div class="movie-rating">
                            <span class="rating-value ${ratingClass}">${movie.rating}/10</span>
                            <span class="rating-stars">${starsDisplay}</span>
                        </div>
                        <button class="delete-btn" onclick="deleteMovie(${movie.id})">️ Удалить</button>
                    </div>
                `;
                
                grid.appendChild(card);
            });

            countSpan.textContent = displayMovies.length;
            const avg = displayMovies.length > 0 
                ? (displayMovies.reduce((sum, m) => sum + m.rating, 0) / displayMovies.length).toFixed(1)
                : '0';
            avgSpan.textContent = avg;
        }

        function showMessage(message, type) {
            const container = document.getElementById('messageContainer');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = message;
            container.appendChild(div);
            setTimeout(() => {
                div.style.opacity = '0';
                div.style.transform = 'translateY(-10px)';
                setTimeout(() => div.remove(), 300);
            }, 2500);
        }

        updateStars(7);
        renderMovies();
        updateGenresFilter();
    </script>
</body>
</html>
