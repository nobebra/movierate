<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieRate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; padding: 40px 0; margin-bottom: 30px; }
        h1 { font-size: 3em; background: linear-gradient(45deg, #ff6b6b, #feca57); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-group { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        #movieInput {
            flex: 1;
            min-width: 250px;
            padding: 15px 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 16px;
        }
        #movieInput:focus { outline: none; border-color: #ff6b6b; }
        .rating-control {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 20px;
            border-radius: 10px;
        }
        .rating-label { font-weight: 600; color: #feca57; }
        #ratingInput {
            width: 80px;
            padding: 10px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 18px;
            text-align: center;
        }
        .stars { display: flex; gap: 5px; }
        .star { font-size: 24px; cursor: pointer; color: #444; }
        .star.active { color: #feca57; }
        .star:hover { color: #feca57; }
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #ff6b6b, #ee5a5a);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { background: #555; cursor: not-allowed; transform: none; }
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .movie-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .movie-poster { width: 100%; height: 400px; object-fit: cover; }
        .movie-info { padding: 20px; }
        .movie-title { font-size: 1.3em; margin-bottom: 8px; }
        .movie-meta { color: #888; font-size: 0.9em; margin-bottom: 10px; }
        .movie-rating {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .rating-value { font-size: 2em; font-weight: bold; color: #feca57; }
        .delete-btn {
            background: rgba(255, 0, 0, 0.2);
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
            padding: 8px 15px;
            font-size: 14px;
            margin-top: 10px;
            width: 100%;
        }
        .no-poster {
            width: 100%;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #2d2d44, #1e1e2e);
            color: #666;
            font-size: 4em;
        }
        .error {
            background: rgba(255, 0, 0, 0.2);
            color: #ff6b6b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .stats { text-align: center; margin-bottom: 30px; color: #888; }
        .stats span { color: #feca57; font-weight: bold; }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #2d2d44;
            border-radius: 15px;
            max-width: 800px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 25px;
        }
        .search-result {
            display: flex;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .search-result:hover { background: rgba(255, 107, 107, 0.1); }
        .search-result img { width: 80px; height: 120px; object-fit: cover; border-radius: 6px; }
        .modal-close { float: right; background: transparent; color: #fff; font-size: 24px; padding: 0; width: 30px; height: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 MovieRate</h1>
            <p>Оценивай свои любимые фильмы</p>
        </header>

        <div class="search-section">
            <div class="input-group">
                <input type="text" id="movieInput" placeholder="Введите название фильма..." autocomplete="off">
                <div class="rating-control">
                    <span class="rating-label">Оценка:</span>
                    <input type="number" id="ratingInput" min="1" max="10" value="7">
                    <div class="stars" id="starContainer">
                        <span class="star" data-rating="1">★</span>
                        <span class="star" data-rating="2">★</span>
                        <span class="star" data-rating="3">★</span>
                        <span class="star" data-rating="4">★</span>
                        <span class="star" data-rating="5">★</span>
                        <span class="star" data-rating="6">★</span>
                        <span class="star" data-rating="7">★</span>
                        <span class="star" data-rating="8">★</span>
                        <span class="star" data-rating="9">★</span>
                        <span class="star" data-rating="10">★</span>
                    </div>
                </div>
                <button onclick="addMovie()" id="addBtn">Добавить фильм</button>
            </div>
        </div>

        <div id="errorContainer"></div>

        <div class="stats">
            Всего фильмов: <span id="movieCount">0</span> | Средняя оценка: <span id="avgRating">0</span>
        </div>

        <div class="movies-grid" id="moviesGrid"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h2>Найдено несколько фильмов:</h2>
            <div id="searchResults"></div>
        </div>
    </div>

    <script>
        // === НАСТРОЙКИ ===
        const PROXY_URL = 'https://thingproxy.freeboard.io/fetch/';
        const API_KEY = '1dd11f7a4931848fe0321bff3cf906ba';

        let movies = JSON.parse(localStorage.getItem('myMovies')) || [];

        const stars = document.querySelectorAll('.star');
        const ratingInput = document.getElementById('ratingInput');

        stars.forEach(star => {
            star.addEventListener('click', function() {
                const rating = parseInt(this.getAttribute('data-rating'));
                ratingInput.value = rating;
                updateStars(rating);
            });
        });

        ratingInput.addEventListener('input', function() {
            let value = parseInt(this.value);
            if (value < 1) value = 1;
            if (value > 10) value = 10;
            updateStars(value);
        });

        function updateStars(rating) {
            stars.forEach((star, index) => {
                star.classList.toggle('active', index < rating);
            });
        }

        document.getElementById('movieInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addMovie();
        });

        async function addMovie() {
            const title = document.getElementById('movieInput').value.trim();
            const rating = parseInt(document.getElementById('ratingInput').value);

            if (!title) { showMessage('Введите название фильма'); return; }
            if (rating < 1 || rating > 10) { showMessage('Оценка должна быть от 1 до 10'); return; }

            const btn = document.getElementById('addBtn');
            btn.disabled = true;
            btn.textContent = 'Поиск...';

            try {
                const targetUrl = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&language=ru-RU&query=${encodeURIComponent(title)}`;
                const response = await fetch(PROXY_URL + encodeURIComponent(targetUrl));
                const data = await response.json();

                if (data.results && data.results.length > 0) {
                    if (data.results.length === 1) {
                        addMovieToCollection(data.results[0], rating);
                        document.getElementById('movieInput').value = '';
                    } else {
                        showSelectionModal(data.results, rating);
                    }
                } else {
                    showMessage(`Фильм "${title}" не найден`);
                }
            } catch (error) {
                showMessage('Ошибка соединения. Попробуйте позже.');
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Добавить фильм';
            }
        }

        function showSelectionModal(results, rating) {
            const container = document.getElementById('searchResults');
            container.innerHTML = '';

            results.slice(0, 6).forEach(movie => {
                const year = movie.release_date ? movie.release_date.substring(0, 4) : '—';
                const posterUrl = movie.poster_path ? `https://image.tmdb.org/t/p/w300${movie.poster_path}` : '';
                
                const div = document.createElement('div');
                div.className = 'search-result';
                div.innerHTML = `
                    ${posterUrl ? `<img src="${posterUrl}" alt="${movie.title}">` : '<div style="width:80px;height:120px;background:#444;border-radius:6px"></div>'}
                    <div>
                        <h3>${movie.title}</h3>
                        <p>📅 ${year} | ⭐ ${movie.vote_average ? movie.vote_average.toFixed(1) : 'N/A'}</p>
                    </div>
                `;
                div.onclick = () => {
                    addMovieToCollection(movie, rating);
                    closeModal();
                    document.getElementById('movieInput').value = '';
                };
                container.appendChild(div);
            });

            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        function addMovieToCollection(movieData, rating) {
            const year = movieData.release_date ? movieData.release_date.substring(0, 4) : 'N/A';
            const poster = movieData.poster_path ? `https://image.tmdb.org/t/p/w500${movieData.poster_path}` : null;
            
            const movie = {
                id: Date.now(),
                title: movieData.title,
                year: year,
                poster: poster,
                rating: rating,
                tmdbRating: movieData.vote_average,
                added: new Date().toISOString()
            };

            movies.push(movie);
            saveMovies();
            renderMovies();
            showMessage(`✅ "${movie.title}" добавлен!`, 'success');
        }

        function deleteMovie(id) {
            if (confirm('Удалить этот фильм?')) {
                movies = movies.filter(m => m.id !== id);
                saveMovies();
                renderMovies();
            }
        }

        function saveMovies() {
            localStorage.setItem('myMovies', JSON.stringify(movies));
        }

        function renderMovies() {
            const grid = document.getElementById('moviesGrid');
            const countSpan = document.getElementById('movieCount');
            const avgSpan = document.getElementById('avgRating');

            grid.innerHTML = '';
            
            if (movies.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #666; padding: 40px;">Нет добавленных фильмов</div>';
                countSpan.textContent = '0';
                avgSpan.textContent = '0';
                return;
            }

            const sortedMovies = [...movies].sort((a, b) => new Date(b.added) - new Date(a.added));

            sortedMovies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                const starsDisplay = '★'.repeat(movie.rating) + '☆'.repeat(10 - movie.rating);
                
                card.innerHTML = `
                    ${movie.poster ? `<img src="${movie.poster}" alt="${movie.title}" class="movie-poster" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">` : ''}
                    <div class="no-poster" style="display: ${movie.poster ? 'none' : 'flex'}">🎬</div>
                    <div class="movie-info">
                        <h3 class="movie-title">${movie.title}</h3>
                        <div class="movie-meta">📅 ${movie.year} ${movie.tmdbRating ? '| ⭐ TMDB: ' + movie.tmdbRating.toFixed(1) : ''}</div>
                        <div class="movie-rating">
                            <span class="rating-value">${movie.rating}/10</span>
                            <span>${starsDisplay}</span>
                        </div>
                        <button class="delete-btn" onclick="deleteMovie(${movie.id})">Удалить</button>
                    </div>
                `;
                
                grid.appendChild(card);
            });

            countSpan.textContent = movies.length;
            const avg = (movies.reduce((sum, m) => sum + m.rating, 0) / movies.length).toFixed(1);
            avgSpan.textContent = avg;
        }

        function showMessage(message, type = 'error') {
            const container = document.getElementById('errorContainer');
            const div = document.createElement('div');
            div.className = 'error';
            if (type === 'success') {
                div.style.background = 'rgba(76, 175, 80, 0.2)';
                div.style.color = '#4caf50';
            }
            div.textContent = message;
            container.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }

        updateStars(7);
        renderMovies();
    </script>
</body>
</html>
